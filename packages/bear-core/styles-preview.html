<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  body{margin:0;background:#FBF6EC;font-family:"Segoe UI",sans-serif;}
  .row{display:flex;}
  .cell{width:230px;height:280px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:14px;}
  .cell svg{width:180px;height:180px;}
  .lbl{margin-top:10px;font-size:18px;font-weight:800;color:#5A4A38;}
  .sub{font-size:12px;color:#8A7A66;margin-top:2px;}
</style></head><body>
<div class="row">

  <!-- 1) 모찌곰: 외곽선 없음, 미니멀, 초소형 이목구비 -->
  <div class="cell">
    <svg viewBox="0 0 100 100">
      <circle cx="28" cy="26" r="11" fill="#C79A6E"/><circle cx="72" cy="26" r="11" fill="#C79A6E"/>
      <ellipse cx="50" cy="56" rx="37" ry="35" fill="#C79A6E"/>
      <ellipse cx="50" cy="68" rx="15" ry="11" fill="#F2E6D2"/>
      <ellipse cx="32" cy="64" rx="6" ry="3.5" fill="#E9A6A0" opacity=".6"/>
      <ellipse cx="68" cy="64" rx="6" ry="3.5" fill="#E9A6A0" opacity=".6"/>
      <circle cx="40" cy="56" r="3" fill="#4A3B2E"/><circle cx="60" cy="56" r="3" fill="#4A3B2E"/>
      <ellipse cx="50" cy="63" rx="3" ry="2.2" fill="#4A3B2E"/>
    </svg>
    <div class="lbl">1. 모찌곰</div><div class="sub">미니멀·외곽선X·말랑</div>
  </div>

  <!-- 2) 큰눈 아기곰: 큰 반짝 눈, 카와이 -->
  <div class="cell">
    <svg viewBox="0 0 100 100">
      <circle cx="26" cy="24" r="12" fill="#A9774E"/><circle cx="74" cy="24" r="12" fill="#A9774E"/>
      <circle cx="26" cy="24" r="6" fill="#EBD7BD"/><circle cx="74" cy="24" r="6" fill="#EBD7BD"/>
      <ellipse cx="50" cy="54" rx="38" ry="36" fill="#A9774E"/>
      <ellipse cx="50" cy="66" rx="20" ry="14" fill="#EBD7BD"/>
      <ellipse cx="30" cy="64" rx="7" ry="4" fill="#E89A9A" opacity=".6"/>
      <ellipse cx="70" cy="64" rx="7" ry="4" fill="#E89A9A" opacity=".6"/>
      <ellipse cx="38" cy="52" rx="6.5" ry="8.5" fill="#3A2A1E"/><ellipse cx="62" cy="52" rx="6.5" ry="8.5" fill="#3A2A1E"/>
      <circle cx="35.5" cy="49" r="2.4" fill="#fff"/><circle cx="59.5" cy="49" r="2.4" fill="#fff"/>
      <ellipse cx="50" cy="60" rx="5" ry="3.5" fill="#4A3527"/>
      <path d="M44,66 Q50,71 56,66" stroke="#4A3527" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="lbl">2. 큰눈 아기곰</div><div class="sub">큰 반짝 눈·카와이</div>
  </div>

  <!-- 3) 볼드 곰돌이: 현재 스타일(굵은 외곽선·통통) -->
  <div class="cell">
    <svg viewBox="0 0 100 100">
      <g stroke="#2B211A" stroke-width="3.2" stroke-linejoin="round">
      <circle cx="28" cy="24" r="13" fill="#9C6A41"/><circle cx="72" cy="24" r="13" fill="#9C6A41"/>
      <circle cx="28" cy="24" r="6.5" fill="#F2E2C7"/><circle cx="72" cy="24" r="6.5" fill="#F2E2C7"/>
      <ellipse cx="50" cy="54" rx="38" ry="36" fill="#9C6A41"/></g>
      <ellipse cx="50" cy="66" rx="19" ry="14" fill="#F2E2C7"/>
      <ellipse cx="33" cy="64" rx="6.5" ry="4" fill="#E79A9A" opacity=".6"/>
      <ellipse cx="67" cy="64" rx="6.5" ry="4" fill="#E79A9A" opacity=".6"/>
      <ellipse cx="39" cy="55" rx="4" ry="5" fill="#2B211A"/><ellipse cx="61" cy="55" rx="4" ry="5" fill="#2B211A"/>
      <circle cx="37.7" cy="53.3" r="1.4" fill="#fff"/><circle cx="59.7" cy="53.3" r="1.4" fill="#fff"/>
      <ellipse cx="50" cy="61" rx="5" ry="3.6" fill="#2B211A"/>
      <path d="M44,67 Q50,73 56,67" stroke="#2B211A" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="lbl">3. 볼드 곰돌이</div><div class="sub">굵은 외곽선·또렷</div>
  </div>

  <!-- 4) 동글선곰: 얇고 깔끔한 선, 스티커풍 -->
  <div class="cell">
    <svg viewBox="0 0 100 100">
      <g stroke="#6B4F38" stroke-width="2" stroke-linejoin="round">
      <circle cx="29" cy="26" r="11" fill="#BE8A5E"/><circle cx="71" cy="26" r="11" fill="#BE8A5E"/>
      <circle cx="29" cy="26" r="5.5" fill="#F2E6D2"/><circle cx="71" cy="26" r="5.5" fill="#F2E6D2"/>
      <ellipse cx="50" cy="55" rx="37" ry="35" fill="#BE8A5E"/></g>
      <ellipse cx="50" cy="66" rx="18" ry="13" fill="#F2E6D2"/>
      <ellipse cx="33" cy="63" rx="6" ry="3.5" fill="#E9A6A0" opacity=".55"/>
      <ellipse cx="67" cy="63" rx="6" ry="3.5" fill="#E9A6A0" opacity=".55"/>
      <circle cx="40" cy="55" r="3.2" fill="#6B4F38"/><circle cx="60" cy="55" r="3.2" fill="#6B4F38"/>
      <ellipse cx="50" cy="61" rx="4" ry="3" fill="#6B4F38"/>
      <path d="M45,66 Q50,70 55,66" stroke="#6B4F38" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="lbl">4. 동글선곰</div><div class="sub">얇은 선·스티커풍</div>
  </div>

</div>
</body></html>
