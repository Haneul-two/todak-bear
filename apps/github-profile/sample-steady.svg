<svg xmlns="http://www.w3.org/2000/svg" width="480" height="190" viewBox="0 0 480 190" role="img" aria-label="토닥곰: 잘 가고 있어, 천천히 가자.">
  <defs>
    <style>
      .face { font: 700 38px ui-monospace, "Cascadia Code", Menlo, monospace; }
      .name { font: 700 20px ui-sans-serif, system-ui, "Segoe UI", sans-serif; }
      .msg  { font: 400 16px ui-sans-serif, system-ui, "Segoe UI", sans-serif; }
      .sub  { font: 400 12px ui-sans-serif, system-ui, "Segoe UI", sans-serif; }
    </style>
  </defs>
  <rect x="1" y="1" width="478" height="188" rx="18" fill="#FFFDF8" stroke="#9C8A7A" stroke-width="2"/>
  <!-- 곰 얼굴 (단일 캐릭터 스펙의 face를 그대로 사용 → 어느 표면에서나 같은 곰) -->
  <text class="face" x="36" y="78" fill="#9C8A7A">ʕ •ᴥ• ʔ</text>
  <text class="name" x="40" y="116" fill="#5A5048">토닥곰</text>
  <text class="msg"  x="40" y="142" fill="#5A5048">잘 가고 있어, 천천히 가자.</text>
  <circle cx="20" cy="150" r="5" fill="#9C8A7A"/><circle cx="36" cy="150" r="5" fill="#E5E0DA"/><circle cx="52" cy="150" r="5" fill="#E5E0DA"/><circle cx="68" cy="150" r="5" fill="#E5E0DA"/><circle cx="84" cy="150" r="5" fill="#E5E0DA"/><circle cx="100" cy="150" r="5" fill="#E5E0DA"/><circle cx="116" cy="150" r="5" fill="#E5E0DA"/>
  <text class="sub" x="140" y="154" fill="#9A9088">이번 주 커밋 6개</text>
</svg>